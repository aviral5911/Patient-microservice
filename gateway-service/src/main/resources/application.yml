
server:
  port: 4004



spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient-route
              uri: http://patient-service:4000
              predicates:
                - Path=/patient,/patient/**
              filters:
                - JwtValidation

            - id: auth-service-route
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1